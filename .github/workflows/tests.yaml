name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  coverage:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v7
    - uses: subosito/flutter-action@v2
    - run: flutter config --enable-linux-desktop
    - run: flutter test --coverage
    - uses: codecov/codecov-action@v7
      with:
        token: ${{secrets.CODECOV_TOKEN}}

  run:
    runs-on: ubuntu-24.04
    container:
      image: dart:stable
    steps:
    - uses: actions/checkout@v7
    - run: dart pub get
    - run: dart test
